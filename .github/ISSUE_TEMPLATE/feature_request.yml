name: Feature request
description: Schlage eine Verbesserung fuer Sensoren, Automationen oder Abruflogik vor.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Welches Problem soll geloest werden?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Dein Vorschlag
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Welche Alternativen hast du betrachtet?
    validations:
      required: false
